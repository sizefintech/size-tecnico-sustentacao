version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/dotnet:8.0
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - devnet

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Size@2024!Strong
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Size@2024!Strong' -C -N -Q 'SELECT 1' 2>/dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Size@2024!Strong' -Q 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 10s
      retries: 15
      start_period: 30s
      timeout: 5s
    networks:
      - devnet

networks:
  devnet:
    driver: bridge

volumes:
  sqlserver-data:
